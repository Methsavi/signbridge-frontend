name: SignBridge Frontend CI

on:
  push:
  pull_request:

jobs:
  build-and-lint:
    name: Lint & Build Check (React / Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build app
        # Dummy env vars so Vite doesn't produce undefined warnings during build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000
          VITE_APPWRITE_ENDPOINT: https://cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: dummy-project-id
        run: npm run build
